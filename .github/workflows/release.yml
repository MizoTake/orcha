name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-test-package:
    name: Build/Test/Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: orcha
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: orcha
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: orcha.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo test (lib)
        run: cargo test --lib --locked

      - name: Cargo build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          archive="orcha-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          tar -C "target/${{ matrix.target }}/release" -czf "$archive" "${{ matrix.binary_name }}"
          echo "ARCHIVE_NAME=$archive" >> "$GITHUB_ENV"

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "orcha-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" -DestinationPath $archive
          "ARCHIVE_NAME=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-test-package
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
