version: 1

agents:
  local_llm:
    mode: "cli"
    model: "qwen/qwen3-30b-a3b-2507"
    cli:
      command: "opencode-cli"
      args: ["run", "--thinking"]
      prompt_via_stdin: true
      model_arg: "-m"
      ensure_no_permission_flags: true

  claude:
    mode: "cli"
    cli:
      command: "claude"
      args: ["-p"]
      prompt_via_stdin: true
      model_arg: null
      ensure_no_permission_flags: true
  gemini:
    mode: "cli"
    cli:
      command: "gemini"
      args: ["-p"]
      prompt_via_stdin: true
      model_arg: null
      ensure_no_permission_flags: true
  codex:
    mode: "cli"
    cli:
      command: "codex"
      args: ["exec", "--skip-git-repo-check"]
      prompt_via_stdin: true
      model_arg: null
      ensure_no_permission_flags: true

execution:
  profile: "opencode_impl_no_review"
  profile_strategy:
    alternating:
      - "opencode_impl_no_review"
      - "opencode_impl_no_review"
      - "opencode_impl_codex_review"
      - "opencode_impl_no_review"
      - "opencode_impl_claude_review"
      - "opencode_impl_no_review"
      - "opencode_impl_no_review"
      - "codex_impl_opencode_review"
      - "opencode_impl_no_review"
      - "claude_impl_opencode_review"
      - "opencode_impl_no_review"
    every_n_cycles: []
    mixins: []
  cli_limit:
    disable_agent_on_limit: true
  acceptance_criteria:
    - "`TodoList::add` assigns incremental IDs starting from `1`."
    - "`TodoList::complete` marks the target item as done and returns `false` for unknown IDs."
    - "`TodoList::pending_titles` returns only unfinished task titles."
  verification:
    commands:
      - "cargo check --manifest-path samples/todo-lib/Cargo.toml"
      - "cargo test --manifest-path samples/todo-lib/Cargo.toml"
