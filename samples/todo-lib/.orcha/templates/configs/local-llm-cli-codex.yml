# local_llm as CLI using codex command.
# Use this block under agents.local_llm in .orcha/orcha.yml.

agents:
  local_llm:
    mode: "cli"
    model: "gpt-5-codex"
    cli:
      command: "codex"
      args: ["exec", "--skip-git-repo-check"]
      prompt_via_stdin: true
      model_arg: "-m"
      ensure_no_permission_flags: true

# Notes:
# - ensure_no_permission_flags: true keeps --ask-for-approval never attached for codex.
# - You can set command to claude/opencode/vibe-local/lmstudio CLI as needed.
